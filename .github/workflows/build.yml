name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt5 PyQtWebEngine
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name "AegisSuite" --add-data "index.html;." app.py
      - name: Upload EXE
        uses: actions/upload-artifact@v2
        with:
          name: AegisSuite-EXE
          path: dist/AegisSuite.exe
